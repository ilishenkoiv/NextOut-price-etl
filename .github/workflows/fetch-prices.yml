name: Twice-daily price fetch

# Collects Travelpayouts prices and writes them to Supabase (tables `prices`, `offers`,
# `price_history`). Secrets come from GitHub → Settings → Secrets and variables → Actions.
#
# 12-month horizon, split across FOUR STRICTLY SEQUENTIAL jobs of 3 months each:
#   months 1–3  (MONTH_START=1)
#   months 4–6  (MONTH_START=4)   needs: months 1–3
#   months 7–9  (MONTH_START=7)   needs: months 4–6
#   months 10–12 (MONTH_START=10) needs: months 7–9
#
# WHY FOUR, AND WHY NEVER IN PARALLEL. The previous 2×6-month split put ~2637 route-pairs ×
# 6 months = 15 822 requests in one job — ~315 min against a 360-min GitHub hosted-runner
# hard cap, and the last two runs were CANCELLED on timeout. Halving the month slice halves
# the request count per job to 7911, which at the collector's 1091 ms target interval is
# ~144 min — real headroom under the 180-minute ceiling below. In practice a job is nearer
# ~82 min: the collector skips route-pairs that are dead across the whole horizon and only
# re-checks a seventh of them per run. Running the jobs in parallel is NOT an option: both
# would spend the same token and two streams collide with the 60 req/min API limit, so every
# job waits for its predecessor via `needs:`.
#
# The horizon stays 12 months on purpose. Cutting it to 9 would need a matching change to
# `horizonMonths` in the app (lib/prices.ts) — without it the user can pick a month nothing
# is collected for. That is a separate, paired change.
#
# Tiered schedule: far months (7–12) change slowly — refreshed once daily. Near months
# (1–6) change fast and are refreshed twice daily for the evening search peak.
#   01:00 Berlin start + ~5h30 full sweep (4 jobs)   → 12 months ready by ~06:30.
#   12:00 Berlin start + ~2h45 near sweep (2 jobs)   → months 1–6 ready by ~14:45.
# (Those are the with-skipping figures; the worst case, every dead pair alive again, is
# ~9h35 and ~4h50. The concurrency guard below covers the overlap either way.)
#
# WINTER TIME: GitHub Actions cron is UTC and does NOT follow the CET switch. The times
# above assume CEST (summer, UTC+2). In winter (CET, UTC+1) the runs land one hour earlier
# in Berlin. Adjust in late October if wanted.

on:
  schedule:
    - cron: '0 23 * * *'   # 01:00 Berlin (CEST) — full 12-month sweep, all four jobs
    - cron: '0 10 * * *'   # 12:00 Berlin (CEST) — near months 1–6 only (first two jobs)
  workflow_dispatch:
    inputs:
      scope:
        description: 'Which months to collect'
        type: choice
        options: [both, near, far]
        default: both

env:
  # Public project URL (not a secret) — the script also defaults to this.
  SUPABASE_URL: https://xpalogebawoljlafsafs.supabase.co

# Hard guarantee that two RUNS never collect at once. The nightly sweep is long enough that
# it can overrun into the noon start; without this, the two would collect simultaneously and
# double the request rate past the 60/min TP limit. With a single workflow-level concurrency
# group, a new run stays PENDING until the in-progress one finishes.
# cancel-in-progress: false — never abort a run mid-collection (it's writing to Supabase);
# make the newcomer wait instead. (This covers whole runs; the job order WITHIN a run is
# enforced separately by the `needs:` chain.)
concurrency:
  group: price-fetch
  cancel-in-progress: false

# Nothing in this workflow writes to the repo any more: the price snapshot is uploaded to the
# private `price-snapshots` Supabase Storage bucket by the collector itself. Only checkout
# needs the token, and read is enough. Kept EXPLICIT rather than deleted — an absent block
# falls back to the repository default, which may still grant write.
permissions:
  contents: read

jobs:
  months_1_3:
    name: months 1–3
    # Runs on BOTH cron schedules (near is refreshed twice daily) and on a manual
    # near/both run. Skipped only for a manual far-only run.
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'near' ||
      github.event.inputs.scope == 'both'
    runs-on: ubuntu-latest
    # Worst case (no pair skipped) 2637 route-pairs × 3 months = 7911 requests ≈ 144 min at
    # the 1091 ms target interval; ~82 min with the dead pairs skipped. 180 covers the worst
    # case with headroom and stays well under GitHub's 360-min cap.
    timeout-minutes: 180
    env:
      MONTH_START: '1'
      MONTH_COUNT: '3'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 22 has native WebSocket + fetch. The script also passes a `ws` transport
          # as a belt-and-suspenders fallback, so it works on older Node too.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch months 1–3 → Supabase
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-prices.mjs

  months_4_6:
    name: months 4–6
    # Second half of the near window — same schedule rule as months 1–3. `always()` lets it
    # run even when its predecessor failed or was skipped; `needs:` only orders the two.
    needs: months_1_3
    if: >-
      always() &&
      (
        github.event_name == 'schedule' ||
        github.event.inputs.scope == 'near' ||
        github.event.inputs.scope == 'both'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      MONTH_START: '4'
      MONTH_COUNT: '3'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch months 4–6 → Supabase
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-prices.mjs

  months_7_9:
    name: months 7–9
    # Far months only on the nightly full sweep (cron '0 23'), or a manual far/both run —
    # never on the noon near-only run ('0 10').
    needs: months_4_6
    if: >-
      always() &&
      (
        (github.event_name == 'schedule' && github.event.schedule == '0 23 * * *') ||
        github.event.inputs.scope == 'far' ||
        github.event.inputs.scope == 'both'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      MONTH_START: '7'
      MONTH_COUNT: '3'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch months 7–9 → Supabase
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-prices.mjs

  months_10_12:
    name: months 10–12
    # Tail of the horizon — same schedule rule as months 7–9.
    needs: months_7_9
    if: >-
      always() &&
      (
        (github.event_name == 'schedule' && github.event.schedule == '0 23 * * *') ||
        github.event.inputs.scope == 'far' ||
        github.event.inputs.scope == 'both'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      MONTH_START: '10'
      MONTH_COUNT: '3'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch months 10–12 → Supabase
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-prices.mjs
