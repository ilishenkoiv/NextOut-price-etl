name: Nightly price fetch

# Collects Travelpayouts prices and writes them to Supabase (tables prices/hotels).
# Secrets come from GitHub → Settings → Secrets and variables → Actions.

on:
  # Run takes ~3h (125 destinations, 9402 requests at >=1100ms).
  # Scheduled so data is fresh by 10:00 and 18:00 Berlin time.
  # Runs do not overlap: 07:00+3h = 10:00, next start 15:00 (5h gap).
  schedule:
    - cron: '0 5 * * *'    # 07:00 Berlin — run finishes ~10:00, data fresh for the day
    - cron: '0 13 * * *'   # 15:00 Berlin — run finishes ~18:00, data fresh for the evening search peak
  workflow_dispatch: {}   # manual "Run workflow" button in the Actions tab

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    # ~172 min typical run (125 destinations, 9402 requests at ≥1100ms); headroom for retries.
    timeout-minutes: 350
    env:
      # Public project URL (not a secret) — the script also defaults to this.
      SUPABASE_URL: https://xpalogebawoljlafsafs.supabase.co
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 22 has native WebSocket + fetch. The script also passes a `ws` transport
          # as a belt-and-suspenders fallback, so it works on older Node too.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch prices → Supabase
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-prices.mjs
