name: Nightly price fetch

# Collects Travelpayouts prices and writes them to Supabase (table `prices`).
# Secrets come from GitHub → Settings → Secrets and variables → Actions.
#
# 12-month horizon, split across two SEQUENTIAL jobs so neither exceeds the 6-hour
# GitHub Actions job limit (2247 routes × 6 months ≈ 247 min/job, well under 360):
#   near — months 1–6  (MONTH_START=1)
#   far  — months 7–12 (MONTH_START=7), needs: near → NEVER runs in parallel with it
#          (parallel runs would double the request rate and break the 60/min TP limit).
#
# Tiered schedule: Far months (7–12) change slowly — refreshed once daily. Near months
# (1–6) change fast and are refreshed twice daily for the evening search peak.
#
# Since low-cost bases now query the FULL 125-destination network (2247 route-pairs, up from
# 1567), a job takes ~247 min (was ~172) and the full sweep ~8h14 (was ~6h). Starts moved
# EARLIER so data is still fresh by 10:00 and 17:00 Berlin time.
# 01:00 start + ~8h14 full sweep (12 months) = ready by ~09:15.
# 12:00 start + ~4h07 near sweep (6 months)  = ready by ~16:10.
# Runs never overlap: full sweep ends 07:14 UTC, near starts 10:00 UTC (2h46 gap).
#
# WINTER TIME: GitHub Actions cron is UTC and does NOT follow the CET switch. The times
# below assume CEST (summer, UTC+2). In winter (CET, UTC+1) the runs shift one hour earlier
# in Berlin — start 00:00 / 11:00, ready by ~08:15 / ~15:10. The UTC non-overlap gap (2h46)
# is season-independent. Adjust in late October if wanted.

on:
  schedule:
    - cron: '0 23 * * *'   # 01:00 Berlin (CEST) — full 12-month sweep (near → far, ~8h14), ready by ~09:15
    - cron: '0 10 * * *'   # 12:00 Berlin (CEST) — near 6 months only (~4h07), ready by ~16:10
  workflow_dispatch:
    inputs:
      scope:
        description: 'Which months to collect'
        type: choice
        options: [both, near, far]
        default: both

env:
  # Public project URL (not a secret) — the script also defaults to this.
  SUPABASE_URL: https://xpalogebawoljlafsafs.supabase.co

# Hard guarantee that two runs never collect at once. The scheduled starts already leave a
# 2h46 UTC gap, but if the full sweep ever overruns past that, the noon near run would start
# while it's still going and double the request rate past the 60/min TP limit. With a single
# workflow-level concurrency group, a new run stays PENDING until the in-progress one finishes.
# cancel-in-progress: false — never abort a run mid-collection (it's writing to Supabase); make
# the newcomer wait instead. (Applies across whole workflow runs; the in-run near→far order is
# still enforced separately by `needs: near`.)
concurrency:
  group: price-fetch
  cancel-in-progress: false

# Nothing in this workflow writes to the repo any more: the price snapshot is uploaded to the
# private `price-snapshots` Supabase Storage bucket by the collector itself. Only checkout
# needs the token, and read is enough. Kept EXPLICIT rather than deleted — an absent block
# falls back to the repository default, which may still grant write.
permissions:
  contents: read

jobs:
  near:
    # Runs on BOTH cron schedules (near is refreshed twice daily) and on a manual
    # near/both run. Skipped only for a manual far-only run.
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'near' ||
      github.event.inputs.scope == 'both'
    runs-on: ubuntu-latest
    # Observed 269–311 min for 6 months (2391 route-pairs, 18 origins). Adding DRS+LEJ takes it to
    # 2657 pairs (+11%) → worst case ~346 min, over the old 340. 355 is a STOPGAP ceiling (GitHub
    # hosted-runner hard cap is 360). Proper fix is a 3-way month split — planned, separate session.
    timeout-minutes: 355
    env:
      MONTH_START: '1'
      MONTH_COUNT: '6'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 22 has native WebSocket + fetch. The script also passes a `ws` transport
          # as a belt-and-suspenders fallback, so it works on older Node too.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch near months (1–6) → Supabase
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-prices.mjs

  far:
    # Far months only on the nightly full sweep (cron '0 23'), or a manual far/both run —
    # never on the noon near-only run ('0 10'). `needs: near` keeps it strictly after near
    # (no concurrent API load); `always()` lets it still run when near was SKIPPED (a manual
    # far-only dispatch).
    needs: near
    if: >-
      always() &&
      (
        (github.event_name == 'schedule' && github.event.schedule == '0 23 * * *') ||
        github.event.inputs.scope == 'far' ||
        github.event.inputs.scope == 'both'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 340
    env:
      MONTH_START: '7'
      MONTH_COUNT: '6'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch far months (7–12) → Supabase
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-prices.mjs
