name: Nightly price fetch

# Collects Travelpayouts prices and writes them to Supabase (table `prices`).
# Secrets come from GitHub → Settings → Secrets and variables → Actions.
#
# 12-month horizon, split across two SEQUENTIAL jobs so neither exceeds the 6-hour
# GitHub Actions job limit (1567 routes × 12 months ≈ 345 min would be too close):
#   near — months 1–6  (MONTH_START=1)
#   far  — months 7–12 (MONTH_START=7), needs: near → NEVER runs in parallel with it
#          (parallel runs would double the request rate and break the 60/min TP limit).
#
# Tiered schedule: Far months (7–12) change slowly — refreshed once daily. Near months
# (1–6) change fast and are refreshed twice daily for the evening search peak.
#
# Scheduled so data is fresh by 10:00 and 17:00 Berlin time.
# 04:00 start + ~6h full sweep (12 months) = ready by 10:00.
# 14:00 start + ~3h near sweep (6 months) = ready by 17:00.
# Runs never overlap: first ends 10:00, second starts 14:00 (4h gap).
#
# WINTER TIME: GitHub Actions cron is UTC and does NOT follow the CET switch. The times
# below assume CEST (summer, UTC+2). In winter (CET, UTC+1) the runs shift one hour earlier
# in Berlin — start 03:00 / 13:00, ready by 09:00 / 16:00. Adjust in late October if wanted.

on:
  schedule:
    - cron: '0 2 * * *'    # 04:00 Berlin (CEST) — full 12-month sweep (near → far, ~6h), ready by 10:00
    - cron: '0 12 * * *'   # 14:00 Berlin (CEST) — near 6 months only (~3h), ready by 17:00
  workflow_dispatch:
    inputs:
      scope:
        description: 'Which months to collect'
        type: choice
        options: [both, near, far]
        default: both

env:
  # Public project URL (not a secret) — the script also defaults to this.
  SUPABASE_URL: https://xpalogebawoljlafsafs.supabase.co

jobs:
  near:
    # Runs on BOTH cron schedules (near is refreshed twice daily) and on a manual
    # near/both run. Skipped only for a manual far-only run.
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'near' ||
      github.event.inputs.scope == 'both'
    runs-on: ubuntu-latest
    # ~172 min typical for 6 months; 340 leaves headroom for retries, well under the 6h cap.
    timeout-minutes: 340
    env:
      MONTH_START: '1'
      MONTH_COUNT: '6'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 22 has native WebSocket + fetch. The script also passes a `ws` transport
          # as a belt-and-suspenders fallback, so it works on older Node too.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch near months (1–6) → Supabase
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-prices.mjs

  far:
    # Far months only on the 04:00 full sweep, or a manual far/both run — never at 14:00.
    # `needs: near` keeps it strictly after near (no concurrent API load); `always()`
    # lets it still run when near was SKIPPED (a manual far-only dispatch).
    needs: near
    if: >-
      always() &&
      (
        (github.event_name == 'schedule' && github.event.schedule == '0 2 * * *') ||
        github.event.inputs.scope == 'far' ||
        github.event.inputs.scope == 'both'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 340
    env:
      MONTH_START: '7'
      MONTH_COUNT: '6'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch far months (7–12) → Supabase
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-prices.mjs
